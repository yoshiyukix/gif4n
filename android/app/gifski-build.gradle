// Android: gifski NDK ビルド設定
// このファイルは app/build.gradle から apply from で読み込む

android {
    defaultConfig {
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }
}

dependencies {
    // gifski AAR（Rust Cargo ビルドの成果物）
    // EAS ビルド環境でのセットアップ:
    //   1. Cargo でビルド: cargo build --target aarch64-linux-android --release
    //   2. 生成された libgifski.so を src/main/jniLibs/arm64-v8a/ へ配置
    //   3. gifski-jni Kotlin バインディングを src/main/java/ へ追加
}
